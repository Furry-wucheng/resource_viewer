<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ResourcePicker 弹窗 — Resource Viewer</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #e0e0e0; margin: 0; }

    .picker-dialog {
      background: var(--color-surface); border-radius: var(--radius-lg);
      width: 440px; max-width: 92vw; box-shadow: var(--shadow-lg);
      display: flex; flex-direction: column; max-height: 85vh;
    }

    .picker-topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--color-outline); flex-shrink: 0;
    }
    .picker-title { font-size: 14px; font-weight: 600; }
    .picker-close {
      font-size: 20px; cursor: pointer; border: none; background: none;
      color: var(--color-on-surface-variant); padding: 4px;
    }
    .picker-count { font-size: 12px; color: var(--color-primary); font-weight: 500; }

    .picker-body { flex: 1; overflow-y: auto; padding: 4px 0; }

    .tree-node-row {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 16px; cursor: pointer; user-select: none;
    }
    .tree-node-row:hover { background: var(--color-surface-variant); }

    .expand-btn {
      width: 20px; height: 20px; display: flex; align-items: center;
      justify-content: center; color: var(--color-on-surface-variant);
      border: none; background: none; cursor: pointer; font-size: 16px;
      flex-shrink: 0; transition: transform 0.15s;
    }
    .expand-btn.expanded { transform: rotate(90deg); }

    .node-icon { font-size: 18px; color: var(--color-on-surface-variant); flex-shrink: 0; }
    .node-name { flex: 1; font-size: 14px; }
    .node-extra { font-size: 10px; color: var(--color-on-surface-variant); }

    .tree-check {
      width: 20px; height: 20px; border: 2px solid var(--color-outline);
      border-radius: 4px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 12px; color: transparent;
      transition: all 0.15s;
    }
    .tree-check.checked { background: var(--color-primary); border-color: var(--color-primary); color: white; }

    .tree-children { margin-left: 48px; overflow: hidden; transition: max-height 0.25s; }
    .tree-children.collapsed { max-height: 0 !important; }

    .select-all-btn {
      margin-left: 48px; padding: 2px 16px 2px 0;
      font-size: 11px; color: var(--color-primary);
      cursor: pointer; border: none; background: none; text-align: left;
      display: block;
    }
    .select-all-btn:hover { text-decoration: underline; }

    .picker-bottom {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-top: 1px solid var(--color-outline);
      flex-shrink: 0; gap: 8px;
    }
    .picker-bottom .count-text { font-size: 12px; color: var(--color-on-surface-variant); }
    .picker-bottom .action-btns { display: flex; gap: 8px; }


    .hidden { display: none !important; }
  </style>
</head>
<body>

  <div class="picker-dialog">
    <div class="picker-topbar">
      <button class="picker-close material-icons">close</button>
      <span class="picker-title">扫描入库：全部漫画</span>
      <span class="picker-count" id="pickCount">已选 0 项</span>
    </div>

    <div class="picker-body">
      <!-- 根节点 -->
      <div class="tree-node-row">
        <span class="material-icons node-icon" style="color:var(--color-star)">folder_open</span>
        <span class="node-name" style="font-weight:500">全部漫画</span>
      </div>
      <button class="select-all-btn" onclick="selectAllInGroup('root')">全选子项 (5)</button>

      <!-- 海贼王 (可勾选) -->
      <div class="tree-children" id="children-root" style="max-height:2000px">
        <div class="tree-node-row">
          <div class="tree-check" data-file="海贼王" onclick="toggleFileCheck('海贼王')">✓</div>
          <span class="material-icons node-icon">folder</span>
          <span class="node-name">海贼王</span>
          <span class="node-extra">176 文件</span>
        </div>

        <!-- 进击的巨人 (展开/折叠) -->
        <div class="tree-node-row">
          <div class="tree-check" data-file="进击的巨人" onclick="toggleFileCheck('进击的巨人')">✓</div>
          <button class="expand-btn material-icons" onclick="toggleGroup(event, 'jijing')">chevron_right</button>
          <span class="material-icons node-icon">folder</span>
          <span class="node-name">进击的巨人</span>
          <span class="node-extra">4 话</span>
        </div>
        <button class="select-all-btn hidden" id="selectAllJijing" onclick="selectAllInGroup('jijing')">全选子项 (4)</button>
        <div class="tree-children collapsed" id="children-jijing">
          <div class="tree-node-row">
            <div class="tree-check" data-file="进击/卷01" onclick="toggleFileCheck('进击/卷01')">✓</div>
            <span class="material-icons node-icon">bookmark</span>
            <span class="node-name">卷01</span>
          </div>
          <div class="tree-node-row">
            <div class="tree-check" data-file="进击/卷02" onclick="toggleFileCheck('进击/卷02')">✓</div>
            <span class="material-icons node-icon">bookmark</span>
            <span class="node-name">卷02</span>
          </div>
          <div class="tree-node-row">
            <div class="tree-check" data-file="进击/卷03" onclick="toggleFileCheck('进击/卷03')">✓</div>
            <span class="material-icons node-icon">bookmark</span>
            <span class="node-name">卷03</span>
          </div>
          <div class="tree-node-row">
            <div class="tree-check" data-file="进击/卷04" onclick="toggleFileCheck('进击/卷04')">✓</div>
            <span class="material-icons node-icon">bookmark</span>
            <span class="node-name">卷04</span>
          </div>
        </div>

        <!-- 鬼灭之刃 -->
        <div class="tree-node-row">
          <div class="tree-check" data-file="鬼灭之刃" onclick="toggleFileCheck('鬼灭之刃')">✓</div>
          <span class="material-icons node-icon">folder</span>
          <span class="node-name">鬼灭之刃</span>
          <span class="node-extra">205 文件</span>
        </div>

        <!-- 设定集.pdf -->
        <div class="tree-node-row">
          <div class="tree-check" data-file="设定集.pdf" onclick="toggleFileCheck('设定集.pdf')">✓</div>
          <span class="material-icons node-icon" style="color:var(--tag-red)">picture_as_pdf</span>
          <span class="node-name">设定集.pdf</span>
        </div>

        <!-- 画集 -->
        <div class="tree-node-row">
          <div class="tree-check" data-file="画集" onclick="toggleFileCheck('画集')">✓</div>
          <span class="material-icons node-icon">folder</span>
          <span class="node-name">画集</span>
          <span class="node-extra">48 图片</span>
        </div>

        <!-- 资料混合 (可展开) -->
        <div class="tree-node-row">
          <div class="tree-check" data-file="资料混合" onclick="toggleFileCheck('资料混合')">✓</div>
          <button class="expand-btn material-icons" onclick="toggleGroup(event, 'mixed')">chevron_right</button>
          <span class="material-icons node-icon">folder</span>
          <span class="node-name">资料混合</span>
          <span class="node-extra">2 项</span>
        </div>
        <button class="select-all-btn hidden" id="selectAllMixed" onclick="selectAllInGroup('mixed')">全选子项 (2)</button>
        <div class="tree-children collapsed" id="children-mixed">
          <div class="tree-node-row">
            <div class="tree-check" data-file="资料子文件夹" onclick="toggleFileCheck('资料子文件夹')">✓</div>
            <span class="material-icons node-icon">folder</span>
            <span class="node-name">资料子文件夹</span>
          </div>
          <div class="tree-node-row">
            <div class="tree-check" data-file="README.pdf" onclick="toggleFileCheck('README.pdf')">✓</div>
            <span class="material-icons node-icon" style="color:var(--tag-red)">picture_as_pdf</span>
            <span class="node-name">README.pdf</span>
          </div>
        </div>
      </div>
    </div>

    <div class="picker-bottom">
      <span class="count-text" id="bottomCount">已选 0 项</span>
      <div class="action-btns">
        <button class="btn btn-primary" id="batchAddBtn">批量添加资源</button>
        <button class="btn">取消</button>
      </div>
    </div>
  </div>

  <script>
    let checkedFiles = new Set();

    function toggleFileCheck(file) {
      if (checkedFiles.has(file)) checkedFiles.delete(file);
      else checkedFiles.add(file);
      updateAllChecks();
      updateCount();
    }

    function updateAllChecks() {
      document.querySelectorAll('.tree-check[data-file]').forEach(cb => {
        const file = cb.dataset.file;
        cb.classList.toggle('checked', checkedFiles.has(file));
      });
    }

    function updateCount() {
      const n = checkedFiles.size;
      document.getElementById('pickCount').textContent = `已选 ${n} 项`;
      document.getElementById('bottomCount').textContent = `已选 ${n} 项`;
      document.getElementById('batchAddBtn').textContent = `批量添加资源 (${n})`;
    }

    function toggleGroup(event, groupId) {
      event.stopPropagation();
      const children = document.getElementById('children-' + groupId);
      const arrow = event.target;
      const selectAllBtn = document.getElementById('selectAll' + groupId.charAt(0).toUpperCase() + groupId.slice(1));
      const isCollapsed = children.classList.contains('collapsed');

      if (isCollapsed) {
        children.classList.remove('collapsed');
        children.style.maxHeight = children.scrollHeight + 'px';
        arrow.classList.add('expanded');
        if (selectAllBtn) selectAllBtn.classList.remove('hidden');
      } else {
        children.style.maxHeight = children.scrollHeight + 'px';
        requestAnimationFrame(() => {
          children.style.maxHeight = '0px';
          children.classList.add('collapsed');
        });
        arrow.classList.remove('expanded');
        if (selectAllBtn) selectAllBtn.classList.add('hidden');
      }
    }

    function selectAllInGroup(groupId) {
      const children = document.getElementById('children-' + groupId);
      if (!children) return;
      children.querySelectorAll('.tree-check[data-file]').forEach(cb => {
        checkedFiles.add(cb.dataset.file);
      });
      updateAllChecks();
      updateCount();
    }

    function expandAll() {
      document.querySelectorAll('.tree-children').forEach(ch => {
        ch.classList.remove('collapsed');
        ch.style.maxHeight = '2000px';
      });
      document.querySelectorAll('.expand-btn').forEach(btn => btn.classList.add('expanded'));
      document.querySelectorAll('.select-all-btn').forEach(btn => btn.classList.remove('hidden'));
    }

    function collapseAll() {
      document.querySelectorAll('.tree-children').forEach(ch => {
        ch.style.maxHeight = '0px';
        ch.classList.add('collapsed');
      });
      document.querySelectorAll('.expand-btn').forEach(btn => btn.classList.remove('expanded'));
      document.querySelectorAll('.select-all-btn').forEach(btn => {
        if (btn.onclick.toString().includes('root')) { /* keep root select-all visible */ }
        else btn.classList.add('hidden');
      });
    }

    function selectAllChildren() {
      document.querySelectorAll('.tree-check[data-file]').forEach(cb => {
        checkedFiles.add(cb.dataset.file);
      });
      updateAllChecks();
      updateCount();
    }

    function clearAll() {
      checkedFiles.clear();
      updateAllChecks();
      updateCount();
    }

    // Init
    updateCount();
  </script>
</body>
</html>
