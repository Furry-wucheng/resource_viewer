<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标签管理 — Resource Viewer</title>
  <link rel="stylesheet" href="design-tokens.css">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    .page-content-tags { flex: 1; overflow-y: auto; padding: 12px; }

    .search-box {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: var(--color-surface-variant);
      border-radius: var(--radius-md); margin-bottom: 16px;
    }
    .search-box input {
      flex: 1; border: none; background: none; outline: none;
      font-size: 14px; color: var(--color-on-surface);
    }
    .search-box .search-clear {
      cursor: pointer; border: none; background: none; color: var(--color-on-surface-variant); font-size: 18px; display: none;
    }
    .search-box .search-clear.show { display: inline; }

    .tag-section-title {
      font-size: 10px; color: var(--color-on-surface-variant);
      text-transform: uppercase; letter-spacing: 1px;
      padding: 8px 0; margin-bottom: 4px;
    }

    .tag-list-card {
      background: var(--color-surface); border-radius: var(--radius-md);
      padding: 0 12px; border: 1px solid var(--color-outline);
    }
    .tag-item {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 0; cursor: pointer; transition: all 0.2s;
    }
    .tag-item:not(:last-child) { border-bottom: 1px solid var(--color-outline); }
    .tag-item.hidden { display: none; }

    .tag-dot-color { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .tag-info { flex: 1; }
    .tag-name-row { display: flex; align-items: center; gap: 6px; }
    .tag-name { font-size: 14px; font-weight: 500; }
    .tag-builtin { font-size: 10px; color: var(--color-primary); background: var(--color-primary-container); padding: 2px 6px; border-radius: 4px; }
    .tag-count { font-size: 12px; color: var(--color-on-surface-variant); }

    .more-btn {
      font-size: 22px; color: var(--color-on-surface-variant);
      cursor: pointer; border: none; background: none; padding: 4px;
      border-radius: 50%; transition: background 0.15s;
    }
    .more-btn:hover { background: var(--color-surface-variant); }

    /* 弹出菜单 */
    .popup-menu {
      position: fixed; background: var(--color-surface);
      border-radius: var(--radius-md); box-shadow: var(--shadow-lg);
      border: 1px solid var(--color-outline); overflow: hidden;
      z-index: 100; min-width: 140px;
    }
    .popup-menu-item {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; font-size: 14px; cursor: pointer;
      border: none; background: none; color: var(--color-on-surface);
      width: 100%; text-align: left;
    }
    .popup-menu-item:hover { background: var(--color-surface-variant); }
    .popup-menu-item.danger { color: var(--color-error); }

    /* 确认弹窗 */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .confirm-dialog {
      background: var(--color-surface); border-radius: var(--radius-lg);
      padding: 24px; width: 340px; max-width: 90vw; box-shadow: var(--shadow-lg);
    }
    .confirm-dialog .title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
    .confirm-dialog .msg { font-size: 14px; color: var(--color-on-surface-variant); margin-bottom: 24px; }
    .confirm-dialog .actions { display: flex; justify-content: flex-end; gap: 8px; }

    .hidden { display: none !important; }

    .no-result { text-align: center; padding: 32px; color: var(--color-on-surface-variant); font-size: 14px; display: none; }
    .no-result.show { display: block; }
  </style>
</head>
<body>
  <div class="app-container">

    <div class="top-bar">
      <button class="btn-back material-icons">arrow_back</button>
      <span class="title">标签管理</span>
      <span style="font-size:14px;color:var(--color-on-surface-variant)">共 8 个</span>
    </div>

    <div class="page-content-tags">
      <div class="search-box">
        <span class="material-icons" style="color:var(--color-on-surface-variant)">search</span>
        <input type="text" id="searchInput" placeholder="搜索标签..." oninput="doSearch()">
        <button class="search-clear material-icons" id="searchClear" onclick="clearSearch()">close</button>
      </div>

      <div class="tag-section-title" id="builtinTitle">内置标签</div>
      <div class="tag-list-card" id="builtinList">
        <div class="tag-item" data-name="收藏">
          <span class="tag-dot-color" style="background:var(--color-star)"></span>
          <div class="tag-info">
            <div class="tag-name-row">
              <span class="tag-name">收藏</span>
              <span class="tag-builtin">内置</span>
              <span class="material-icons" style="font-size:14px;color:var(--color-on-surface-variant)">lock</span>
            </div>
            <span class="tag-count">共 12 个资源</span>
          </div>
        </div>
      </div>

      <div class="tag-section-title" style="margin-top:16px" id="customTitle">自定义标签</div>
      <div class="tag-list-card" id="customList">
        <div class="tag-item" data-name="热血">
          <span class="tag-dot-color" style="background:var(--tag-red)"></span>
          <div class="tag-info"><span class="tag-name">热血</span><br><span class="tag-count">共 8 个资源</span></div>
          <button class="more-btn material-icons" onclick="showMenu(event, '热血')">more_horiz</button>
        </div>
        <div class="tag-item" data-name="已完结">
          <span class="tag-dot-color" style="background:var(--tag-green)"></span>
          <div class="tag-info"><span class="tag-name">已完结</span><br><span class="tag-count">共 15 个资源</span></div>
          <button class="more-btn material-icons" onclick="showMenu(event, '已完结')">more_horiz</button>
        </div>
        <div class="tag-item" data-name="汉化">
          <span class="tag-dot-color" style="background:var(--tag-deep-blue)"></span>
          <div class="tag-info"><span class="tag-name">汉化</span><br><span class="tag-count">共 20 个资源</span></div>
          <button class="more-btn material-icons" onclick="showMenu(event, '汉化')">more_horiz</button>
        </div>
        <div class="tag-item" data-name="未读">
          <span class="tag-dot-color" style="background:var(--tag-orange)"></span>
          <div class="tag-info"><span class="tag-name">未读</span><br><span class="tag-count">共 3 个资源</span></div>
          <button class="more-btn material-icons" onclick="showMenu(event, '未读')">more_horiz</button>
        </div>
        <div class="tag-item" data-name="长篇">
          <span class="tag-dot-color" style="background:var(--tag-purple)"></span>
          <div class="tag-info"><span class="tag-name">长篇</span><br><span class="tag-count">共 6 个资源</span></div>
          <button class="more-btn material-icons" onclick="showMenu(event, '长篇')">more_horiz</button>
        </div>
        <div class="tag-item" data-name="短篇">
          <span class="tag-dot-color" style="background:var(--tag-blue)"></span>
          <div class="tag-info"><span class="tag-name">短篇</span><br><span class="tag-count">共 4 个资源</span></div>
          <button class="more-btn material-icons" onclick="showMenu(event, '短篇')">more_horiz</button>
        </div>
        <div class="tag-item" data-name="科幻">
          <span class="tag-dot-color" style="background:var(--tag-cyan)"></span>
          <div class="tag-info"><span class="tag-name">科幻</span><br><span class="tag-count">共 7 个资源</span></div>
          <button class="more-btn material-icons" onclick="showMenu(event, '科幻')">more_horiz</button>
        </div>
      </div>

      <div class="no-result" id="noResult">没有找到匹配的标签</div>
    </div>
  </div>

  <!-- 弹出菜单 -->
  <div class="popup-menu hidden" id="popupMenu">
    <button class="popup-menu-item" onclick="closeMenu()"><span class="material-icons" style="font-size:16px">edit</span> 重命名</button>
    <button class="popup-menu-item" onclick="closeMenu()"><span class="material-icons" style="font-size:16px">palette</span> 修改颜色</button>
    <button class="popup-menu-item danger" onclick="showDeleteConfirm()"><span class="material-icons" style="font-size:16px">delete</span> 删除</button>
  </div>

  <!-- 删除确认弹窗 -->
  <div class="overlay hidden" id="deleteOverlay">
    <div class="confirm-dialog">
      <div class="title">删除标签</div>
      <div class="msg" id="deleteMsg">删除标签"热血"将解除所有资源的关联，确定吗？</div>
      <div class="actions">
        <button class="btn" onclick="hideDeleteConfirm()">取消</button>
        <button class="btn btn-danger" onclick="confirmDelete()">确认删除</button>
      </div>
    </div>
  </div>

  <script>
    let currentMenuFor = '';

    function showMenu(event, tagName) {
      currentMenuFor = tagName;
      const menu = document.getElementById('popupMenu');
      menu.style.top = event.clientY + 'px';
      menu.style.left = Math.min(event.clientX, window.innerWidth - 160) + 'px';
      menu.classList.remove('hidden');
      event.stopPropagation();
    }

    function closeMenu() {
      document.getElementById('popupMenu').classList.add('hidden');
    }

    function showDeleteConfirm() {
      closeMenu();
      document.getElementById('deleteMsg').textContent = `删除标签"${currentMenuFor}"将解除所有资源的关联，确定吗？`;
      document.getElementById('deleteOverlay').classList.remove('hidden');
    }

    function hideDeleteConfirm() {
      document.getElementById('deleteOverlay').classList.add('hidden');
    }

    function confirmDelete() {
      hideDeleteConfirm();
      const items = document.querySelectorAll('.tag-item');
      items.forEach(item => {
        if (item.dataset.name === currentMenuFor) {
          item.style.maxHeight = item.offsetHeight + 'px';
          item.style.overflow = 'hidden';
          item.style.transition = 'max-height 0.3s, padding 0.3s, opacity 0.3s';
          requestAnimationFrame(() => {
            item.style.maxHeight = '0';
            item.style.padding = '0';
            item.style.opacity = '0';
          });
          setTimeout(() => item.remove(), 300);
        }
      });
    }

    function doSearch() {
      const query = document.getElementById('searchInput').value.trim().toLowerCase();
      const clear = document.getElementById('searchClear');
      clear.style.display = query ? 'inline' : 'none';

      let hasResult = false;
      document.querySelectorAll('.tag-item').forEach(item => {
        const name = (item.dataset.name || '').toLowerCase();
        const match = !query || name.includes(query);
        item.classList.toggle('hidden', !match);
        if (match) hasResult = true;
      });

      document.getElementById('noResult').classList.toggle('show', !hasResult && !!query);
      document.getElementById('builtinTitle').classList.toggle('hidden', !!query);
      document.getElementById('customTitle').classList.toggle('hidden', !!query);

      const visible = document.querySelectorAll('.tag-item:not(.hidden)').length;
      document.querySelector('.top-bar span:last-child').textContent = `共 ${visible} 个`;
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      doSearch();
    }


    document.addEventListener('click', function(e) {
      if (!e.target.closest('.popup-menu') && !e.target.closest('.more-btn')) {
        closeMenu();
      }
    });
    document.getElementById('deleteOverlay').addEventListener('click', function(e) {
      if (e.target === this) hideDeleteConfirm();
    });
  </script>
</body>
</html>
