name: resource_viewer
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # 数据层
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  flutter_secure_storage: ^10.3.1

  # 状态管理 & 路由
  provider: ^6.1.2
  go_router: ^14.8.1

  # 领域模型
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # 网络与文件系统
  dart_smb2: ^0.1.0
  file_picker: ^10.3.3
  permission_handler: ^11.4.0

  # 媒体处理
  pdfrx: ^2.4.4
  archive: ^4.0.9
  image: ^4.5.0
  crypto: ^3.0.6
  extended_image: ^10.0.1

  # 视频播放
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7
  fc_native_video_thumbnail: ^3.0.1

  # 工具
  uuid: ^4.5.0
  intl: ^0.20.0
  path: ^1.9.1
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.0
  freezed: ^3.2.5
  json_serializable: ^6.9.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
